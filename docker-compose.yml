services:
  postgres:
    image: postgres:16-alpine
    container_name: ethara-postgres
    env_file:
      - backend/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ethara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-inventory_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: ethara-backend
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://ethara:changeme@postgres:5432/inventory_db}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    restart: unless-stopped
    command: >
      sh -c "python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    container_name: ethara-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
